<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebabaLab Kitchen Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #333;
            --text: #f0f0f0;
            --muted: #888;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --accent: #f97316;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon { font-size: 1.75rem; }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            transition: background 0.3s;
        }

        .dot.connected { background: var(--green); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .stat { display: flex; gap: 0.25rem; }
        .stat strong { color: var(--text); }

        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 1200px) { .columns { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .columns { grid-template-columns: 1fr; } }

        .column {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .column-header {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .column-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .column-count {
            font-size: 0.75rem;
            background: var(--surface2);
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            color: var(--muted);
        }

        .column-body {
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 200px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* Status colours */
        .col-confirmed .column-header { border-top: 3px solid var(--blue); }
        .col-preparing .column-header { border-top: 3px solid var(--amber); }
        .col-ready .column-header { border-top: 3px solid var(--green); }
        .col-completed .column-header { border-top: 3px solid var(--border); }

        /* Order cards */
        .order-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .order-card:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .order-card.new-order {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .order-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .order-meta {
            font-size: 0.75rem;
            color: var(--muted);
            text-align: right;
        }

        .channel-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--surface);
            color: var(--muted);
            margin-bottom: 0.25rem;
        }

        .order-items {
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .order-item-line {
            display: flex;
            justify-content: space-between;
        }

        .order-item-desc { color: var(--text); }
        .order-item-price { color: var(--muted); }

        .order-customisations {
            font-size: 0.75rem;
            color: var(--muted);
            padding-left: 0.75rem;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .order-total-amount { color: var(--green); }

        .order-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .btn {
            flex: 1;
            padding: 0.4rem 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-muted { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

        .ready-time {
            font-size: 0.75rem;
            color: var(--amber);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            padding: 2rem 1rem;
        }

        /* Toast notifications */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 999;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            max-width: 320px;
            animation: toastIn 0.3s ease-out;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast-title { font-weight: 600; margin-bottom: 0.25rem; }
        .toast-body { color: var(--muted); font-size: 0.8rem; }

        /* Audio alert (hidden) */
        #alert-audio { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-icon">🌯</span>
        <div>
            <div class="logo-text">KebabaLab</div>
            <div class="logo-sub">Kitchen Display</div>
        </div>
    </div>
    <div class="header-right">
        <div class="stats-bar">
            <div class="stat">Today: <strong id="stat-today">0</strong></div>
            <div class="stat">Active: <strong id="stat-active">0</strong></div>
            <div class="stat">Revenue: <strong id="stat-revenue">$0</strong></div>
        </div>
        <div class="connection-status">
            <div class="dot" id="connection-dot"></div>
            <span id="connection-label">Connecting...</span>
        </div>
    </div>
</header>

<main>
    <div class="columns">
        <div class="column col-confirmed">
            <div class="column-header">
                <div class="column-title">📥 New Orders <span class="column-count" id="count-confirmed">0</span></div>
            </div>
            <div class="column-body" id="col-confirmed"></div>
        </div>
        <div class="column col-preparing">
            <div class="column-header">
                <div class="column-title">🔥 Preparing <span class="column-count" id="count-preparing">0</span></div>
            </div>
            <div class="column-body" id="col-preparing"></div>
        </div>
        <div class="column col-ready">
            <div class="column-header">
                <div class="column-title">✅ Ready <span class="column-count" id="count-ready">0</span></div>
            </div>
            <div class="column-body" id="col-ready"></div>
        </div>
        <div class="column col-completed">
            <div class="column-header">
                <div class="column-title">📦 Done <span class="column-count" id="count-completed">0</span></div>
            </div>
            <div class="column-body" id="col-completed"></div>
        </div>
    </div>
</main>

<div id="toast-container"></div>

<script>
const CHANNEL_ICONS = { voice: '📞', whatsapp: '💬', sms: '📱', web: '🌐' };
const STATUS_ORDER = ['confirmed', 'preparing', 'ready', 'completed'];
const NEXT_STATUS = { confirmed: 'preparing', preparing: 'ready', ready: 'completed' };
const BTN_LABELS = { confirmed: 'Start Cooking', preparing: 'Mark Ready', ready: 'Collected' };

let orders = {};
let stats = { today: 0, revenue: 0 };

// ─── Render ───────────────────────────────────────────────────────────────────

function renderOrder(order, isNew = false) {
    const el = document.createElement('div');
    el.className = 'order-card' + (isNew ? ' new-order' : '');
    el.id = `order-${order.id}`;

    const items = order.items || [];
    const channel = order.channel || 'voice';
    const timeStr = order.created_at
        ? new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';

    const itemLines = items.map(item => {
        const desc = [
            item.quantity > 1 ? `${item.quantity}×` : '',
            item.name,
            item.size ? `(${item.size})` : '',
            item.protein ? `- ${item.protein}` : '',
        ].filter(Boolean).join(' ');

        const customLines = [
            item.salads?.length ? `  Salads: ${item.salads.join(', ')}` : '',
            item.sauces?.length ? `  Sauces: ${item.sauces.join(', ')}` : '',
            item.extras?.length ? `  Extras: ${item.extras.join(', ')}` : '',
            item.notes ? `  Note: ${item.notes}` : '',
        ].filter(Boolean);

        const price = (item.price || 0) * (item.quantity || 1);
        return `
            <div class="order-item-line">
                <span class="order-item-desc">${desc}</span>
                <span class="order-item-price">$${price.toFixed(2)}</span>
            </div>
            ${customLines.map(l => `<div class="order-customisations">${l}</div>`).join('')}
        `;
    }).join('');

    const nextStatus = NEXT_STATUS[order.status];
    const actionBtn = nextStatus
        ? `<button class="btn btn-primary" onclick="advanceOrder('${order.id}', '${nextStatus}')">${BTN_LABELS[order.status]}</button>`
        : '';

    el.innerHTML = `
        <div class="order-card-header">
            <div>
                <div class="order-number">#${order.order_number || '??'}</div>
                <div class="channel-badge">${CHANNEL_ICONS[channel] || '?'} ${channel}</div>
            </div>
            <div class="order-meta">
                <div>${timeStr}</div>
                ${order.estimated_ready ? `<div class="ready-time">⏰ ${order.estimated_ready}</div>` : ''}
            </div>
        </div>
        <div class="order-items">${itemLines}</div>
        <div class="order-total">
            <span>${items.length} item${items.length !== 1 ? 's' : ''}</span>
            <span class="order-total-amount">$${(order.total || 0).toFixed(2)}</span>
        </div>
        ${actionBtn ? `<div class="order-actions">${actionBtn}</div>` : ''}
    `;

    return el;
}

function placeOrder(order, isNew = false) {
    orders[order.id] = order;

    // Remove from all columns first
    document.querySelectorAll(`#order-${order.id}`).forEach(el => el.remove());

    const col = document.getElementById(`col-${order.status}`);
    if (!col) return;

    const el = renderOrder(order, isNew);
    col.prepend(el);

    updateCounts();
    updateStats();
}

function updateCounts() {
    const cols = ['confirmed', 'preparing', 'ready', 'completed'];
    cols.forEach(status => {
        const col = document.getElementById(`col-${status}`);
        const count = col ? col.children.length : 0;
        const badge = document.getElementById(`count-${status}`);
        if (badge) badge.textContent = count;

        // Show/hide empty state
        if (col) {
            const existing = col.querySelector('.empty-state');
            if (count === 0 && !existing) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'No orders';
                col.appendChild(empty);
            } else if (count > 0 && existing) {
                existing.remove();
            }
        }
    });

    const active = (document.getElementById('col-confirmed')?.children.length || 0)
        + (document.getElementById('col-preparing')?.children.length || 0);
    document.getElementById('stat-active').textContent = active;
}

function updateStats() {
    document.getElementById('stat-today').textContent = stats.today;
    document.getElementById('stat-revenue').textContent = `$${stats.revenue.toFixed(0)}`;
}

// ─── Actions ─────────────────────────────────────────────────────────────────

async function advanceOrder(orderId, newStatus) {
    try {
        const resp = await fetch(`/api/orders/${orderId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus }),
        });
        if (!resp.ok) throw new Error('Failed');
        const order = orders[orderId];
        if (order) {
            order.status = newStatus;
            placeOrder(order);
        }
    } catch (e) {
        showToast('Error', 'Could not update order status');
    }
}

// ─── SSE Connection ───────────────────────────────────────────────────────────

function connect() {
    const evtSource = new EventSource('/api/events');

    evtSource.onopen = () => {
        document.getElementById('connection-dot').classList.add('connected');
        document.getElementById('connection-label').textContent = 'Live';
    };

    evtSource.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'new_order') {
            const order = msg.data;
            placeOrder(order, true);
            stats.today++;
            stats.revenue += order.total || 0;
            updateStats();
            showToast(`New Order #${order.order_number}`, `$${(order.total || 0).toFixed(2)} via ${order.channel}`);
            playAlert();
        }

        if (msg.type === 'order_update') {
            const { id, status } = msg.data;
            if (orders[id]) {
                orders[id].status = status;
                placeOrder(orders[id]);
            }
        }
    };

    evtSource.onerror = () => {
        document.getElementById('connection-dot').classList.remove('connected');
        document.getElementById('connection-label').textContent = 'Reconnecting...';
        evtSource.close();
        setTimeout(connect, 3000);
    };
}

// ─── Toast ────────────────────────────────────────────────────────────────────

function showToast(title, body) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<div class="toast-title">🌯 ${title}</div><div class="toast-body">${body}</div>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
}

// ─── Alert sound ─────────────────────────────────────────────────────────────

function playAlert() {
    try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    } catch (e) {}
}

// ─── Init ─────────────────────────────────────────────────────────────────────

async function loadInitialOrders() {
    try {
        const resp = await fetch('/api/orders?limit=100');
        const data = await resp.json();
        (data.orders || []).forEach(order => {
            placeOrder(order);
            if (order.status !== 'cancelled') {
                stats.today++;
                stats.revenue += order.total || 0;
            }
        });
        updateStats();
    } catch (e) {
        console.error('Failed to load orders:', e);
    }
}

// Show initial empty state
['confirmed', 'preparing', 'ready', 'completed'].forEach(status => {
    const col = document.getElementById(`col-${status}`);
    if (col) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No orders';
        col.appendChild(empty);
    }
});

loadInitialOrders();
connect();
</script>
</body>
</html>
