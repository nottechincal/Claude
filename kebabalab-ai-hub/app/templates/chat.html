<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebabaLab — Order Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f5;
            --white: #ffffff;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --accent: #f97316;
            --accent-light: #fff7ed;
            --user-bg: #f97316;
            --ai-bg: #f9fafb;
            --shadow: 0 1px 3px rgba(0,0,0,.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .header-info h1 {
            font-size: 1rem;
            font-weight: 700;
        }

        .header-info p {
            font-size: 0.8rem;
            color: var(--muted);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
            box-shadow: var(--shadow);
        }

        .message.user .message-bubble {
            background: var(--user-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: var(--white);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .message.user .message-avatar {
            background: var(--border);
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: var(--muted);
            border-radius: 50%;
            animation: dot-pulse 1.4s infinite ease-in-out both;
        }

        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dot-pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .typing-cursor::after {
            content: '▌';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        footer {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: 1.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            transition: border-color 0.15s;
        }

        #message-input:focus {
            border-color: var(--accent);
        }

        #send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }

        #send-btn:hover { opacity: 0.85; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .quick-replies {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .quick-reply {
            background: var(--accent-light);
            color: var(--accent);
            border: 1px solid #fed7aa;
            border-radius: 9999px;
            padding: 0.35rem 0.85rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .quick-reply:hover {
            background: #ffedd5;
        }
    </style>
</head>
<body>

<header>
    <div class="avatar">🌯</div>
    <div class="header-info">
        <h1>Layla — KebabaLab</h1>
        <p>AI assistant • Usually replies instantly</p>
    </div>
</header>

<div id="chat-messages"></div>

<footer>
    <div class="quick-replies" id="quick-replies">
        <button class="quick-reply" onclick="sendQuick('What\'s on the menu?')">📋 Menu</button>
        <button class="quick-reply" onclick="sendQuick('Are you open?')">🕐 Hours</button>
        <button class="quick-reply" onclick="sendQuick('I\'d like to order a large chicken kebab')">🌯 Quick order</button>
        <button class="quick-reply" onclick="sendQuick('Repeat my last order')">🔄 Repeat order</button>
    </div>
    <div class="input-row">
        <textarea
            id="message-input"
            placeholder="Type your order..."
            rows="1"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</footer>

<script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    let ws;
    let currentAiBubble = null;
    let isThinking = false;

    function connectWS() {
        const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/chat/ws`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {};

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);

            if (msg.type === 'connected') {
                addMessage('ai', msg.message);
            }

            if (msg.type === 'thinking') {
                showThinking();
            }

            if (msg.type === 'chunk') {
                appendToCurrentMessage(msg.text);
            }

            if (msg.type === 'done') {
                finaliseCurrentMessage();
                enableInput();
            }

            if (msg.type === 'error') {
                hideThinking();
                addMessage('ai', 'Sorry, something went wrong. Please try again.');
                enableInput();
            }
        };

        ws.onclose = () => {
            setTimeout(connectWS, 2000);
        };

        ws.onerror = () => {
            ws.close();
        };
    }

    function addMessage(role, text) {
        const wrap = document.createElement('div');
        wrap.className = `message ${role}`;

        const avatarEl = document.createElement('div');
        avatarEl.className = 'message-avatar';
        avatarEl.textContent = role === 'ai' ? '🌯' : '👤';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = text;

        wrap.appendChild(avatarEl);
        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
        scrollToBottom();

        return bubble;
    }

    function showThinking() {
        if (isThinking) return;
        isThinking = true;

        const wrap = document.createElement('div');
        wrap.className = 'message ai';
        wrap.id = 'thinking-indicator';

        const avatarEl = document.createElement('div');
        avatarEl.className = 'message-avatar';
        avatarEl.textContent = '🌯';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

        wrap.appendChild(avatarEl);
        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
        scrollToBottom();
    }

    function hideThinking() {
        const indicator = document.getElementById('thinking-indicator');
        if (indicator) indicator.remove();
        isThinking = false;
    }

    function appendToCurrentMessage(text) {
        if (!currentAiBubble) {
            hideThinking();

            const wrap = document.createElement('div');
            wrap.className = 'message ai';

            const avatarEl = document.createElement('div');
            avatarEl.className = 'message-avatar';
            avatarEl.textContent = '🌯';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble typing-cursor';

            wrap.appendChild(avatarEl);
            wrap.appendChild(bubble);
            messagesEl.appendChild(wrap);
            currentAiBubble = bubble;
        }

        currentAiBubble.textContent += text;
        scrollToBottom();
    }

    function finaliseCurrentMessage() {
        if (currentAiBubble) {
            currentAiBubble.classList.remove('typing-cursor');
            currentAiBubble = null;
        }
        hideThinking();
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function disableInput() {
        sendBtn.disabled = true;
        inputEl.disabled = true;
    }

    function enableInput() {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
    }

    function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

        addMessage('user', text);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        disableInput();

        ws.send(JSON.stringify({ message: text }));
    }

    function sendQuick(text) {
        inputEl.value = text;
        sendMessage();
        document.getElementById('quick-replies').style.display = 'none';
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    connectWS();
</script>
</body>
</html>
